<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تتبع الإجازات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; color: #2d3748; direction: rtl; }
.header { background: linear-gradient(15deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px 32px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.header h1 { font-size: 28px; font-weight: 700; }
.header p { opacity: 0.85; margin-top: 4px; }
.container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
.stat-card .num { font-size: 36px; font-weight: 700; color: #667eea; }
.stat-card .label { color: #718096; margin-top: 4px; font-size: 14px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
.form-group input, .form-group select { padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; direction: rtl; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; font-family: inherit; }
.btn-primary { background: #667eea; color: white; }
.btn-primary:hover { background: #5a67d8; }
.btn-success { background: #38a169; color: white; }
.btn-success:hover { background: #2f855a; }
.btn-danger { background: #fc8181; color: white; font-size: 12px; padding: 6px 12px; }
.btn-danger:hover { background: #f56565; }
.btn-edit { background: #f6ad55; color: white; font-size: 12px; padding: 6px 12px; }
.btn-edit:hover { background: #ed8936; }
.btn-secondary { background: #a0aec0; color: white; }
.btn-secondary:hover { background: #718096; }
table { width: 100%; border-collapse: collapse; }
th { background: #f7fafc; padding: 12px 16px; text-align: right; font-size: 13px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
td { padding: 12px 16px; border-bottom: 1px solid #f0f4f8; font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7fafc; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-active { background: #c6f6d5; color: #276749; }
.badge-upcoming { background: #bee3f8; color: #2c5282; }
.badge-ended { background: #e2e8f0; color: #718096; }
.badge-warning { background: #fefcbf; color: #744210; }
.msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
.msg-success { background: #c6f6d5; color: #276749; }
.msg-error { background: #fed7d7; color: #9b2c2c; }
.today-section { background: linear-gradient(135deg, #e6fffa 0%, #ebf8ff 100%); border: 1px solid #81e6d9; }
.loading { text-align: center; color: #718096; padding: 24px; }
.empty { text-align: center; color: #a0aec0; padding: 24px; font-size: 14px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
.modal .form-grid { margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="header">
<h1>نظام تتبع الإجازات</h1>
<p>إدارة وتتبع إجازات فريق المنصات</p>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">إجمالي الإجازات</div></div>
<div class="stat-card"><div class="num" id="stat-active" style="color:#38a169">-</div><div class="label">في إجازة الآن</div></div>
<div class="stat-card"><div class="num" id="stat-upcoming" style="color:#3182ce">-</div><div class="label">إجازات قادمة</div></div>
<div class="stat-card"><div class="num" id="stat-employees" style="color:#805ad5">-</div><div class="label">عدد الموظفين</div></div>
</div>
<div class="card today-section">
<h2>الحالة اليوم</h2>
<div id="today-info" class="loading">جاري التحميل...</div>
</div>
<div class="card">
<h2>إضافة إجازة جديدة</h2>
<div id="msg-add" class="msg"></div>
<div class="form-grid">
<div class="form-group"><label>الموظف</label><select id="f-employee"><option value="">اختر موظفاً...</option></select></div>
<div class="form-group"><label>تاريخ البداية</label><input type="date" id="f-start"></div>
<div class="form-group"><label>تاريخ النهاية</label><input type="date" id="f-end"></div>
<div class="form-group"><label>السبب</label><input type="text" id="f-reason" placeholder="مثال: إجازة سنوية"></div>
</div>
<div style="margin-top:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
<button class="btn btn-primary" onclick="addLeave()">إضافة الإجازة</button>
<span style="color:#718096; font-size:13px;">أو أضف موظف جديد:</span>
<input type="text" id="f-new-emp" placeholder="اسم الموظف الجديد..." style="padding:10px 12px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px; direction:rtl; flex:1; min-width:180px; font-family:inherit;">
<button class="btn btn-primary" onclick="addEmployee()">إضافة موظف</button>
</div>
</div>
<div class="card" style="border:2px solid #f6ad55;background:#fffbf0;">
<h2 style="color:#c05621;">&#x23F3; الطلبات المعلقة <span id="pending-count" style="background:#f6ad55;color:white;padding:2px 10px;border-radius:20px;font-size:13px;margin-right:8px;">0</span></h2>
<div id="pending-table" class="loading">جاري التحميل...</div>
</div>
<div class="card">
<h2>جميع الإجازات</h2>
<div id="msg-del" class="msg"></div>
<div id="leaves-table" class="loading">جاري التحميل...</div>
</div>
</div>
<div class="modal-overlay" id="edit-modal">
<div class="modal">
<h3>&#x270F;&#xFE0F; تعديل الإجازة</h3>
<div id="msg-edit" class="msg"></div>
<input type="hidden" id="edit-id">
<div class="form-grid">
<div class="form-group"><label>الموظف</label><select id="edit-employee"><option value="">اختر موظفاً...</option></select></div>
<div class="form-group"><label>تاريخ البداية</label><input type="date" id="edit-start"></div>
<div class="form-group"><label>تاريخ النهاية</label><input type="date" id="edit-end"></div>
<div class="form-group"><label>السبب</label><input type="text" id="edit-reason" placeholder="مثال: إجازة سنوية"></div>
</div>
<div class="modal-actions">
<button class="btn btn-secondary" onclick="closeEditModal()">X الغاء</button>
<button class="btn btn-primary" onclick="saveEdit()">حفظ</button>
</div>
</div>
</div>
<script>
const SUPABASE_URL = 'https://wtbypuieilnicomwnwax.supabase.co';
const SUPABASE_KEY = 'sb_publishable_T88-VXy8YDYL91hk9IgWGg_l0B6Ax4w';
async function api(path, method, body) {
  method = method || 'GET';
  const opts = { method, headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': method === 'PATCH' ? 'return=representation' : '' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
function getStatus(start, end) {
  const today = new Date().toISOString().split('T')[0];
  if (end < today) return { label: 'منتهية', cls: 'badge-ended' };
  if (start <= today && end >= today) return { label: 'جارية الآن', cls: 'badge-active' };
  const diff = Math.ceil((new Date(start) - new Date()) / 86400000);
  if (diff <= 7) return { label: 'خلال ' + diff + ' ايام', cls: 'badge-warning' };
  return { label: 'قادمة', cls: 'badge-upcoming' };
}
function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  const months = ['يناير','فبراير','مارس','ابريل','مايو','يونيو','يوليو','اغسطس','سبتمبر','اكتوبر','نوفمبر','ديسمبر'];
  return p[2] + ' ' + months[parseInt(p[1])-1] + ' ' + p[0];
}
function diffDays(s, e) { return Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1; }
function daysLabel(n) { return n === 1 ? 'يوم' : n === 2 ? 'يومين' : n <= 10 ? n + ' ايام' : n + ' يوما'; }
let allEmployees = [];
async function loadEmployees() {
  const emps = await api('employees?select=*&order=name');
  allEmployees = emps;
  const sel = document.getElementById('f-employee');
  sel.innerHTML = '<option value="">اختر موظفا...</option>';
  emps.forEach(function(e) { const opt = document.createElement('option'); opt.value = e.id; opt.textContent = e.name; sel.appendChild(opt); });
  document.getElementById('stat-employees').textContent = emps.length;
  populateEditEmployees();
  return emps;
}
function populateEditEmployees() {
  const sel = document.getElementById('edit-employee');
  sel.innerHTML = '<option value="">اختر موظفا...</option>';
  allEmployees.forEach(function(e) { const opt = document.createElement('option'); opt.value = e.id; opt.textContent = e.name; sel.appendChild(opt); });
}
async function loadLeaves() {
  const leaves = await api('leaves?select=*,employees(name)&status=eq.approved&order=start_date.desc');
  const today2 = new Date().toISOString().split('T')[0];
  leaves.sort(function(a, b) {
    const aEnded = a.end_date < today2;
    const bEnded = b.end_date < today2;
    if (aEnded !== bEnded) return aEnded ? 1 : -1;
    if (!aEnded) return a.start_date < b.start_date ? -1 : 1;
    return b.start_date < a.start_date ? -1 : 1;
  });
  const today = today2;
  let active = 0, upcoming = 0;
  leaves.forEach(function(l) {
    const s = getStatus(l.start_date, l.end_date);
    if (s.cls === 'badge-active') active++;
    if (s.cls === 'badge-upcoming' || s.cls === 'badge-warning') upcoming++;
  });
  document.getElementById('stat-total').textContent = leaves.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-upcoming').textContent = upcoming;
  const todayLeaves = leaves.filter(function(l) { return l.start_date <= today && l.end_date >= today; });
  const todayDiv = document.getElementById('today-info');
  if (todayLeaves.length === 0) {
    todayDiv.innerHTML = '<div class="empty">لا يوجد موظفون في اجازة اليوم</div>';
  } else {
    todayDiv.innerHTML = todayLeaves.map(function(l) {
      return '<div style="display:inline-block;background:white;border:1px solid #81e6d9;border-radius:8px;padding:8px 16px;margin:4px;font-weight:600;">' + (l.employees ? l.employees.name : '-') + '</div>';
    }).join('');
  }
  const tableDiv = document.getElementById('leaves-table');
  if (leaves.length === 0) {
    tableDiv.innerHTML = '<div class="empty">لا توجد اجازات مسجلة</div>';
    return;
  }
  tableDiv.innerHTML = '<table><thead><tr><th>الموظف</th><th>تاريخ البداية</th><th>تاريخ النهاية</th><th>المدة</th><th>السبب</th><th>الحالة</th><th>اجراءات</th></tr></thead><tbody>' +
  leaves.map(function(l) {
    const st = getStatus(l.start_date, l.end_date);
    const days = diffDays(l.start_date, l.end_date);
    return '<tr><td><strong>' + (l.employees ? l.employees.name : '-') + '</strong></td>' +
      '<td>' + formatDate(l.start_date) + '</td>' +
      '<td>' + formatDate(l.end_date) + '</td>' +
      '<td>' + daysLabel(days) + '</td>' +
      '<td>' + (l.reason || '-') + '</td>' +
      '<td><span class="badge ' + st.cls + '">' + st.label + '</span></td>' +
      '<td style="display:flex;gap:6px;flex-wrap:wrap;">' +
      '<button class="btn btn-edit" onclick='openEditModal(' + JSON.stringify(l) + ')'>تعديل</button>' +
      '<button class="btn btn-danger" onclick="deleteLeave(' + l.id + ')">حذف</button>' +
      '</td></tr>';
  }).join('') +
  '</tbody></table>';
}
function openEditModal(leave) {
  document.getElementById('edit-id').value = leave.id;
  document.getElementById('edit-start').value = leave.start_date;
  document.getElementById('edit-end').value = leave.end_date;
  document.getElementById('edit-reason').value = leave.reason || '';
  populateEditEmployees();
  document.getElementById('edit-employee').value = leave.employee_id;
  document.getElementById('msg-edit').style.display = 'none';
  document.getElementById('edit-modal').classList.add('active');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('active');
}
async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const employee_id = document.getElementById('edit-employee').value;
  const start_date = document.getElementById('edit-start').value;
  const end_date = document.getElementById('edit-end').value;
  const reason = document.getElementById('edit-reason').value.trim();
  const msg = document.getElementById('msg-edit');
  if (!employee_id || !start_date || !end_date) {
    msg.textContent = 'يرجى اختيار الموظف وتحديد التواريخ';
    msg.className = 'msg msg-error'; msg.style.display = 'block'; return;
  }
  try {
    await api('leaves?id=eq.' + id, 'PATCH', { employee_id: parseInt(employee_id), start_date, end_date, reason });
    closeEditModal();
    showMsg('msg-del', 'success', 'تم تعديل الاجازة بنجاح');
    await loadLeaves();
  } catch(e) {
    msg.textContent = 'حدث خطأ: ' + e.message;
    msg.className = 'msg msg-error'; msg.style.display = 'block';
  }
}
async function deleteLeave(id) {
  if (!confirm('هل انت متاكد من حذف هذه الاجازة؟')) return;
  try {
    await api('leaves?id=eq.' + id, 'DELETE');
    showMsg('msg-del', 'success', 'تم حذف الاجازة');
    await loadLeaves();
  } catch(e) {
    showMsg('msg-del', 'error', 'حدث خطأ: ' + e.message);
  }
}
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.innerHTML = text;
  el.className = 'msg msg-' + type;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}
async function addLeave() {
  const employee_id = document.getElementById('f-employee').value;
  const start_date = document.getElementById('f-start').value;
  const end_date = document.getElementById('f-end').value;
  const reason = document.getElementById('f-reason').value.trim();
  if (!employee_id || !start_date || !end_date) {
    showMsg('msg-add', 'error', 'يرجى اختيار الموظف وتحديد التواريخ'); return;
  }
  try {
    await api('leaves', 'POST', { employee_id: parseInt(employee_id), start_date, end_date, reason, status: 'approved' });
    document.getElementById('f-employee').value = '';
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value = '';
    document.getElementById('f-reason').value = '';
    showMsg('msg-add', 'success', 'تمت اضافة الاجازة بنجاح');
    await loadLeaves();
  } catch(e) {
    showMsg('msg-add', 'error', 'حدث خطأ: ' + e.message);
  }
}
async function addEmployee() {
  const name = document.getElementById('f-new-emp').value.trim();
  if (!name) { showMsg('msg-add', 'error', 'يرجى ادخال اسم الموظف'); return; }
  try {
    await api('employees', 'POST', { name });
    document.getElementById('f-new-emp').value = '';
    showMsg('msg-add', 'success', 'تمت اضافة الموظف: ' + name);
    await loadEmployees();
  } catch(e) {
    showMsg('msg-add', 'error', 'حدث خطأ: ' + e.message);
  }
}
async function loadPending() {
  try {
    const pending = await api('leaves?select=*,employees(name)&status=eq.pending&order=created_at.desc', 'GET');
    const count = pending ? pending.length : 0;
    document.getElementById('pending-count').textContent = count;
    const div = document.getElementById('pending-table');
    if (!count) { div.innerHTML = '<div class="empty">لا توجد طلبات معلقة</div>'; return; }
    let h = '<table><thead><tr><th>الموظف</th><th>من</th><th>الى</th><th>المدة</th><th>السبب</th><th>اجراء</th></tr></thead><tbody>';
    pending.forEach(function(l) {
      const emp = l.employees ? l.employees.name : '-';
      const days = diffDays(l.start_date, l.end_date);
      h += '<tr><td><strong>' + emp + '</strong></td>' +
        '<td>' + formatDate(l.start_date) + '</td>' +
        '<td>' + formatDate(l.end_date) + '</td>' +
        '<td>' + daysLabel(days) + '</td>' +
        '<td>' + (l.reason || '-') + '</td>' +
        '<td style="display:flex;gap:6px;flex-wrap:wrap;">' +
        '<button class="btn btn-success" style="font-size:12px;padding:6px 14px;" onclick="approveLeave(' + l.id + ')">قبول</button>' +
        '<button class="btn btn-danger" style="font-size:12px;padding:6px 14px;" onclick="rejectLeave(' + l.id + ')">رفض</button>' +
        '</td></tr>';
    });
    h += '</tbody></table>';
    div.innerHTML = h;
  } catch(e) {
    document.getElementById('pending-table').innerHTML = '<div class="empty">خطأ في التحميل</div>';
  }
}
async function approveLeave(id) {
  if (!confirm('هل تريد الموافقة على هذا الطلب؟')) return;
  try {
    await api('leaves?id=eq.' + id, 'PATCH', { status: 'approved' });
    showMsg('msg-del', 'success', 'تمت الموافقة على الطلب');
    await loadLeaves();
    await loadPending();
  } catch(e) {
    showMsg('msg-del', 'error', 'حدث خطأ: ' + e.message);
  }
}
async function rejectLeave(id) {
  const notes = prompt('سبب الرفض (اختياري):') || '';
  try {
    await api('leaves?id=eq.' + id, 'PATCH', { status: 'rejected', notes: notes });
    showMsg('msg-del', 'success', 'تم رفض الطلب');
    await loadLeaves();
    await loadPending();
  } catch(e) {
    showMsg('msg-del', 'error', 'حدث خطأ: ' + e.message);
  }
}
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
(async function() {
  await loadEmployees();
  await loadLeaves();
  await loadPending();
})();
</script>
</body>
</html>
