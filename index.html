<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تتبع الإجازات - الإدارة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, Tahoma, sans-serif; background: #f0f4f8; color: #2d3748; direction: rtl; }
.navbar { background: #1a202c; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
.navbar-brand { font-size: 16px; font-weight: 700; color: white; text-decoration: none; }
.navbar-links { display: flex; gap: 4px; }
.navbar-links a { color: rgba(255,255,255,075); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500; }
.navbar-links a.active { background: #667eea; color: white; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 26px; font-weight: 700; }
.header p { opacity: 0.85; margin-top: 4px; font-size: 13px; }
.header-badge { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.refresh-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 600; }
.container { max-width: 1100px; margin: 28px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
.stat-card .num { font-size: 36px; font-weight: 700; color: #667eea; }
.stat-card .label { color: #718096; margin-top: 4px; font-size: 14px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
.pending-card { border: 2px solid #fbd38d; }
.pending-card h2 { color: #c05621; }
table { width: 100%; border-collapse: collapse; }
th { background: #f7fafc; padding: 12px 16px; text-align: right; font-size: 13px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
td { padding: 12px 16px; border-bottom: 1px solid #f0f4f8; font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7fafc; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-active { background: #c6f6d5; color: #276749; }
.badge-upcoming { background: #bee3f8; color: #2c5282; }
.badge-ended { background: #e2e8f0; color: #718096; }
.btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
.btn-approve { background: #c6f6d5; color: #276749; }
.btn-reject { background: #fed7d7; color: #c53030; }
.btn-delete { background: #fed7d7; color: #c53030; }
.btn-green { background: #38a169; color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.loading { text-align: center; color: #718096; padding: 24px; }
.empty { text-align: center; color: #a0aec0; padding: 24px; font-size: 14px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
.form-group select, .form-group input { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; background: #f7fafc; color: #2d3748; direction: rtl; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: #667eea; background: white; }
.days-preview { font-size: 12px; color: #718096; margin-top: 4px; }
.emp-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.emp-row input { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; }
.days-until { font-size: 12px; color: #3182ce; font-weight: 600; background: #ebf8ff; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-right: 6px; }
</style>
</head>
<body>
<nav class="navbar">
<a href="index.html" class="navbar-brand">نظام الإجازات</a>
<div class="navbar-links">
<a href="employees.html">صفحة الموظفين</a>
<a href="index.html" class="active">لوحة الإدارة</a>
</div>
</nav>
<div class="header">
<div><h1>لوحة الإدارة</h1><p>إدارة الإجازات والموظفين</p></div>
<div style="display:flex;gap:10px;align-items:center;">
<span class="header-badge">الإدارة</span>
<button class="refresh-btn" onclick="loadAll()">تحديث</button>
</div>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">إجمالي الإجازات</div></div>
<div class="stat-card"><div class="num" id="stat-active" style="color:#38a169">-</div><div class="label">في إجازة الآن</div></div>
<div class="stat-card"><div class="num" id="stat-pending" style="color:#c05621">-</div><div class="label">طلبات معلّقة</div></div>
<div class="stat-card"><div class="num" id="stat-employees" style="color:#805ad5">-</div><div class="label">عدد الموظفين</div></div>
</div>
<div class="card pending-card" id="pending-section" style="display:none">
<h2>طلبات الإجازة المعلّقة</h2>
<div id="pending-table" class="loading">جارٍ التحميل...</div>
</div>
<div class="card">
<h2>إضافة إجازة مباشرة</h2>
<div class="form-grid">
<div class="form-group"><label>الموظف</label><select id="add-name"><option value="">-- اختر موظفاً --</option></select></div>
<div class="form-group"><label>تاريخ البداية</label><input type="date" id="add-start" onchange="onAddStartChange()" /></div>
<div class="form-group"><label>تاريخ النهاية</label><input type="date" id="add-end" onchange="updateAddDays()" /><span class="days-preview" id="add-days-preview"></span></div>
</div>
<button class="btn-green" onclick="addLeave()">إضافة الإجازة</button>
</div>
<div class="card">
<h2>جميع الإجازات الموافق عليها</h2>
<div id="leaves-table" class="loading">جارٍ التحميل...</div>
</div>
<div class="card">
<h2>إدارة الموظفين</h2>
<div class="emp-row">
<input type="text" id="new-emp-name" placeholder="اسم الموظف" />
<input type="email" id="new-emp-email" placeholder="البريد الإلكتروني" />
<button class="btn-green" onclick="addEmployee()">إضافة</button>
</div>
<div id="employees-list" class="loading">جارٍ التحميل...</div>
</div>
</div>
<script>
const SUPABASE_URL="https://wtbypuieilnicomwnwax.supabase.co";
const SUPABASE_KEY="sb_publishable_T88-VXy8YDYL91hk9IgWGg_l0B6Ax4w";
let allLeaves=[],allEmployees=[];
async function api(path,method,body){method=method||"GET";var opts={method:method,headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""}};if(body)opts.body=JSON.stringify(body);var res=await fetch(SUPABASE_URL+"/rest/v1/"+path,opts);return res.ok?res.json():[];}
function getStatus(s,e){var t=new Date();t.setHours(0,0,0,0);var sd=new Date(s),ed=new Date(e);if(t>=sd&&t<=ed)return"active";if(t<sd)return"upcoming";return"ended";}
function statusPriority(st){if(st==="active")return 0;if(st==="upcoming")return 1;return 2;}
function sortLeaves(arr){return arr.slice().sort(function(a,b){var pa=statusPriority(getStatus(a.start_date,a.end_date));var pb=statusPriority(getStatus(b.start_date,b.end_date));if(pa!==pb)return pa-pb;return new Date(a.start_date)-new Date(b.start_date);});}
function statusBadge(st){if(st==="active")return'<span class="badge badge-active">في إجازة</span>';if(st==="upcoming")return'<span class="badge badge-upcoming">قادمة</span>';return'<span class="badge badge-ended">انتهت</span>';}
function calcDays(s,e){return Math.round((new Date(e)-new Date(s))/86400000)+1;}
function fmt(d){return new Date(d).toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});}
function daysUntil(s){var t=new Date();t.setHours(0,0,0,0);var sd=new Date(s);var diff=Math.round((sd-t)/86400000);if(diff===0)return"اليوم";if(diff===1)return"غداً";if(diff>1)return"بعد "+diff+" يوم";return null;}
async function loadAll(){var results=await Promise.all([api("leaves?status=eq.approved&select=*,employees(name)&order=start_date.asc"),api("employees?select=*&order=name.asc"),api("leaves?status=eq.pending&select=*,employees(name,email)&order=created_at.asc")]);allLeaves=results[0]||[];allEmployees=results[1]||[];var pendingLeaves=results[2]||[];renderStats(pendingLeaves.length);renderPending(pendingLeaves);renderTable();populateSelects();renderEmployees();}
function renderStats(pendingCount){document.getElementById("stat-total").textContent=allLeaves.length;document.getElementById("stat-active").textContent=allLeaves.filter(l=>getStatus(l.start_date,l.end_date)==="active").length;document.getElementById("stat-pending").textContent=pendingCount;document.getElementById("stat-employees").textContent=allEmployees.length;}
function renderPending(pending){var sec=document.getElementById("pending-section");var el=document.getElementById("pending-table");if(pending.length===0){sec.style.display="none";return;}sec.style.display="block";var html='<table><thead><tr><th>الموظف</th><th>من</th><th>إلى</th><th>الأيام</th><th>الإجراء</th></tr></thead><tbody>';pending.forEach(function(l){var name=l.employees?l.employees.name:(l.employee_name||"");html+='<tr><td>'+name+'</td><td>'+fmt(l.start_date)+'</td><td>'+fmt(l.end_date)+'</td><td>'+calcDays(l.start_date,l.end_date)+'</td><td><button class="btn btn-approve" onclick="approveLeave('+l.id+')">قبول</button> <button class="btn btn-reject" onclick="rejectLeave('+l.id+')">رفض</button></td></tr>';});html+='</tbody></table>';el.innerHTML=html;}
function renderTable(){var el=document.getElementById("leaves-table");var sorted=sortLeaves(allLeaves);if(sorted.length===0){el.innerHTML='<div class="empty">لا توجد إجازات موافق عليها</div>';return;}var html='<table><thead><tr><th>#</th><th>الموظف</th><th>تاريخ البداية</th><th>تاريخ النهاية</th><th>عدد الأيام</th><th>الحالة</th><th>حذف</th></tr></thead><tbody>';sorted.forEach(function(l,i){var name=l.employees?l.employees.name:(l.employee_name||"");var st=getStatus(l.start_date,l.end_date);var daysTag="";if(st==="upcoming"){var u=daysUntil(l.start_date);if(u)daysTag='<span class="days-until">'+u+'</span>';}html+='<tr><td>'+(i+1)+'</td><td>'+name+'</td><td>'+fmt(l.start_date)+daysTag+'</td><td>'+fmt(l.end_date)+'</td><td>'+calcDays(l.start_date,l.end_date)+' يوم</td><td>'+statusBadge(st)+'</td><td><button class="btn btn-delete" onclick="deleteLeave('+l.id+')">حذف</button></td></tr>';});html+='</tbody></table>';el.innerHTML=html;}
function populateSelects(){var sel=document.getElementById("add-name");sel.innerHTML='<option value="">-- اختر موظفاً --</option>';allEmployees.forEach(function(e){sel.innerHTML+='<option value="'+e.id+'">'+e.name+'</option>';});}
function renderEmployees(){var el=document.getElementById("employees-list");if(allEmployees.length===0){el.innerHTML='<div class="empty">لا يوجد موظفون</div>';return;}var html='<table><thead><tr><th>الاسم</th><th>البريد الإلكتروني</th><th>عدد الإجازات</th><th>إجمالي الأيام</th></tr></thead><tbody>';allEmployees.forEach(function(e){var empLeaves=allLeaves.filter(function(l){return l.employee_id===e.id;});var leaveCount=empLeaves.length;var totalDays=empLeaves.reduce(function(sum,l){return sum+calcDays(l.start_date,l.end_date);},0);html+='<tr><td>'+e.name+'</td><td>'+(e.email||'—')+'</td><td style="text-align:center;font-weight:600;color:#667eea;">'+leaveCount+'</td><td style="text-align:center;font-weight:600;color:#38a169;">'+totalDays+' يوم</td></tr>';});html+='</tbody></table>';el.innerHTML=html;}
function onAddStartChange(){var s=document.getElementById("add-start").value;if(s){var min=new Date(s);min.setDate(min.getDate()+1);document.getElementById("add-end").min=min.toISOString().split("T")[0];}updateAddDays();}
function updateAddDays(){var s=document.getElementById("add-start").value;var e=document.getElementById("add-end").value;var p=document.getElementById("add-days-preview");if(s&&e&&new Date(e)>new Date(s)){p.textContent="مدة الإجازة: "+calcDays(s,e)+" يوم";}else{p.textContent="";}}
async function addLeave(){var empId=document.getElementById("add-name").value;var start=document.getElementById("add-start").value;var end=document.getElementById("add-end").value;if(!empId||!start||!end){alert("يرجى تعبئة جميع الحقول");return;}var inserted=await api("leaves","POST",{employee_id:parseInt(empId),start_date:start,end_date:end,status:"approved"});if(inserted&&inserted.length>0){document.getElementById("add-name").value="";document.getElementById("add-start").value="";document.getElementById("add-end").value="";document.getElementById("add-days-preview").textContent="";loadAll();}else{alert("حدث خطأ أثناء الإضافة");}}
async function approveLeave(id){await api("leaves?id=eq."+id,"PATCH",{status:"approved"});loadAll();}
async function rejectLeave(id){await api("leaves?id=eq."+id,"DELETE");loadAll();}
async function deleteLeave(id){if(!confirm("هل أنت متأكد من حذف هذه الإجازة؟"))return;await api("leaves?id=eq."+id,"DELETE");loadAll();}
async function addEmployee(){var name=document.getElementById("new-emp-name").value.trim();var email=document.getElementById("new-emp-email").value.trim();if(!name){alert("يرجى إدخال اسم الموظف");return;}var body={name:name};if(email)body.email=email;var inserted=await api("employees","POST",body);if(inserted&&inserted.length>0){document.getElementById("new-emp-name").value="";document.getElementById("new-emp-email").value="";loadAll();}else{alert("حدث خطأ أثناء الإضافة");}}
async function deleteEmployee(id){if(!confirm("هل أنت متأكد من حذف هذا الموظف؟"))return;await api("employees?id=eq."+id,"DELETE");loadAll();}
loadAll();
</script>
</body>
</html>
