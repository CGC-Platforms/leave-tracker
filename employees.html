<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تتبع الإجازات - الموظفين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif; background: #f3f5f8; color: #2d3748; direction: rtl; line-height: 1.6; }
.navbar { background: #1e2530; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 54px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
.navbar-brand { font-size: 16px; font-weight: 700; color: white; text-decoration: none; }
.navbar-links { display: flex; gap: 4px; }
.navbar-links a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 7px 14px; border-radius: 6px; font-size: 14px; font-weight: 500; transition: background .15s ease; }
.navbar-links a:hover { background: rgba(255,255,255,0.08); }
.navbar-links a.active { background: #3d5a80; color: white; }
.header { background: linear-gradient(135deg, #3d5a80 0%, #2b415c 100%); color: white; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header p { opacity: 0.85; margin-top: 4px; font-size: 13px; }
.header-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.container { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; align-items: stretch; }
.stat-card { background: white; border: 1px solid #edf0f4; border-radius: 10px; padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 92px; }
.stat-card .num { font-size: 32px; font-weight: 700; color: #3d5a80; }
.stat-card .label { color: #718096; margin-top: 4px; font-size: 13px; }
.card { background: white; border: 1px solid #e7ebf0; border-radius: 10px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); margin-bottom: 20px; }
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #2d3748; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
.today-section { background: #f4fbfa; border: 1px solid #cfeee7; padding: 16px 20px; }
.today-section h2 { margin-bottom: 8px; padding-bottom: 6px; }
.request-card h2 { margin-bottom: 10px; padding-bottom: 8px; }
table { width: 100%; border-collapse: collapse; }
th { background: #f7fafc; padding: 10px 14px; text-align: right; font-size: 12px; font-weight: 700; color: #4a5568; border-bottom: 1px solid #e2e8f0; vertical-align: middle; letter-spacing: .2px; }
td { padding: 10px 14px; border-bottom: 1px solid #eef1f5; font-size: 13.5px; vertical-align: middle; text-align: right; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7fafc; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-active { background: #c6f6d5; color: #276749; }
.badge-upcoming { background: #bee3f8; color: #2c5282; }
.badge-ended { background: #e2e8f0; color: #718096; }
.loading { text-align: center; color: #718096; padding: 20px; }
.empty { text-align: center; color: #a0aec0; padding: 20px; font-size: 14px; }
.days-until { font-size: 12px; color: #3182ce; font-weight: 600; background: #ebf8ff; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-right: 6px; }
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
.form-group input, .form-group select { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; background: #f7fafc; color: #2d3748; direction: rtl; width: 220px; height: 40px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #3d5a80; background: white; }
.form-group select { cursor: pointer; }
.form-group select:invalid { color: #a0aec0; }
.form-group select option { color: #2d3748; }
.btn-green { background: #3d5a80; color: white; padding: 10px 24px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: background .15s ease; height: 40px; min-width: 130px; }
.btn-green:hover { background: #2b415c; }
.table-scroll { overflow-x: auto; }
@media (max-width: 640px) {
.navbar { padding: 8px 12px; flex-wrap: wrap; height: auto; gap: 6px; }
.navbar-links { gap: 2px; }
.navbar-links a { padding: 6px 10px; font-size: 13px; }
.header { padding: 16px; }
.header h1 { font-size: 19px; }
.container { margin: 16px auto; padding: 0 12px; }
.stats { grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { padding: 14px; min-height: 80px; }
.stat-card .num { font-size: 26px; }
.card { padding: 14px; }
.card h2 { font-size: 15px; }
th, td { padding: 8px 10px; font-size: 12.5px; }
.form-row { flex-direction: column; align-items: stretch; gap: 14px; }
.form-group input, .form-group select { width: 100%; }
.btn-green { width: 100%; min-width: 0; }
}
</style>
</head>
<body>
<nav class="navbar">
<a href="index.html" class="navbar-brand">نظام الإجازات</a>
<div class="navbar-links">
<a href="employees.html" class="active">الإجازات</a>
</div>
</nav>
<div class="header">
<div><h1>إجازات الفريق</h1><p>تعرف على إجازات الزملاء وقدّم طلب إجازتك بسهولة</p></div>
<div style="display:flex;gap:10px;align-items:center;">
<span class="header-badge" id="today-date"></span>
</div>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><div class="num" id="stat-employees">-</div><div class="label">عدد أعضاء الفريق</div></div>
<div class="stat-card"><div class="num" id="stat-active" style="color:#2f9e6e">-</div><div class="label">في إجازة الآن</div></div>
<div class="stat-card"><div class="num" id="stat-upcoming" style="color:#3182ce">-</div><div class="label">إجازات قادمة</div></div>
<div class="stat-card"><div class="num" id="stat-total" style="color:#6b5b95">-</div><div class="label">إجمالي الإجازات المسجلة</div></div>
</div>
<div class="card today-section">
<h2>من في إجازة اليوم؟</h2>
<div id="today-table" class="loading table-scroll">جارٍ التحميل...</div>
</div>
<div class="card">
<h2>جميع الإجازات</h2>
<div id="leaves-table" class="loading table-scroll">جارٍ التحميل...</div>
</div>
<div class="card request-card">
<h2>تقديم طلب إجازة</h2>
<div class="form-row">
<div class="form-group"><label>اسم الموظف</label><select id="req-name" required><option value="">اختر اسمك</option></select></div>
<div class="form-group"><label>تاريخ البداية</label><input type="date" id="req-start" /></div>
<div class="form-group"><label>تاريخ النهاية</label><input type="date" id="req-end" /></div>
<div class="form-group"><label>&nbsp;</label><button class="btn-green" onclick="submitRequest()">إرسال الطلب</button></div>
</div>
<div id="req-msg" style="margin-top:8px;font-size:14px;"></div>
</div>
</div>
<script>
const SUPABASE_URL="https://wtbypuieilnicomwnwax.supabase.co";
const SUPABASE_KEY="sb_publishable_T88-VXy8YDYL91hk9IgWGg_l0B6Ax4w";
let allLeaves=[],allEmployees=[];
async function api(path,method,body){method=method||"GET";var opts={method:method,headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""}};if(body)opts.body=JSON.stringify(body);var res=await fetch(SUPABASE_URL+"/rest/v1/"+path,opts);return res.ok?res.json():[];}
function getStatus(s,e){var t=new Date();t.setHours(0,0,0,0);var sd=new Date(s),ed=new Date(e);if(t>=sd&&t<=ed)return"active";if(t<sd)return"upcoming";return"ended";}
function statusPriority(st){if(st==="active")return 0;if(st==="upcoming")return 1;return 2;}
function sortLeaves(arr){return arr.slice().sort(function(a,b){var pa=statusPriority(getStatus(a.start_date,a.end_date));var pb=statusPriority(getStatus(b.start_date,b.end_date));if(pa!==pb)return pa-pb;return new Date(a.start_date)-new Date(b.start_date);});}
function statusBadge(st){if(st==="active")return'<span class="badge badge-active">في إجازة</span>';if(st==="upcoming")return'<span class="badge badge-upcoming">قادمة</span>';return'<span class="badge badge-ended">انتهت</span>';}
function calcDays(s,e){return Math.round((new Date(e)-new Date(s))/86400000)+1;}
function fmt(d){return new Date(d).toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});}
function daysUntil(s){var t=new Date();t.setHours(0,0,0,0);var sd=new Date(s);var diff=Math.round((sd-t)/86400000);if(diff===0)return"اليوم";if(diff===1)return"غداً";if(diff>1)return"بعد "+diff+" يوم";return null;}
async function loadAll(){var results=await Promise.all([api("leaves?status=eq.approved&select=*,employees(name)&order=start_date.asc"),api("employees?select=*&order=name.asc")]);allLeaves=results[0]||[];allEmployees=results[1]||[];renderStats();renderToday();renderLeaves();renderNameOptions();}
function renderStats(){document.getElementById("stat-employees").textContent=allEmployees.length;document.getElementById("stat-active").textContent=allLeaves.filter(l=>getStatus(l.start_date,l.end_date)==="active").length;document.getElementById("stat-upcoming").textContent=allLeaves.filter(l=>getStatus(l.start_date,l.end_date)==="upcoming").length;document.getElementById("stat-total").textContent=allLeaves.length;var today=new Date();document.getElementById("today-date").textContent=today.toLocaleDateString("ar-SA",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function renderToday(){var el=document.getElementById("today-table");var todayLeaves=allLeaves.filter(l=>getStatus(l.start_date,l.end_date)==="active");if(todayLeaves.length===0){el.innerHTML='<div class="empty">لا أحد في إجازة اليوم</div>';return;}var html='<table><thead><tr><th>الموظف</th><th>من</th><th>إلى</th><th>عدد الأيام</th></tr></thead><tbody>';todayLeaves.forEach(function(l){var name=l.employees?l.employees.name:(l.employee_name||"");html+='<tr><td><strong>'+name+'</strong></td><td>'+fmt(l.start_date)+'</td><td>'+fmt(l.end_date)+'</td><td>'+calcDays(l.start_date,l.end_date)+' يوم</td></tr>';});html+='</tbody></table>';el.innerHTML=html;}
function renderLeaves(){var el=document.getElementById("leaves-table");var sorted=sortLeaves(allLeaves);if(sorted.length===0){el.innerHTML='<div class="empty">لا توجد إجازات</div>';return;}var html='<table><thead><tr><th>الموظف</th><th>تاريخ البداية</th><th>تاريخ النهاية</th><th>عدد الأيام</th><th>الحالة</th></tr></thead><tbody>';sorted.forEach(function(l){var name=l.employees?l.employees.name:(l.employee_name||"");var st=getStatus(l.start_date,l.end_date);var daysTag="";if(st==="upcoming"){var u=daysUntil(l.start_date);if(u)daysTag='<span class="days-until">'+u+'</span>';}html+='<tr><td>'+name+'</td><td>'+fmt(l.start_date)+daysTag+'</td><td>'+fmt(l.end_date)+'</td><td>'+calcDays(l.start_date,l.end_date)+' يوم</td><td>'+statusBadge(st)+'</td></tr>';});html+='</tbody></table>';el.innerHTML=html;}
function renderNameOptions(){var sel=document.getElementById("req-name");var opts='<option value="">اختر اسمك</option>';allEmployees.forEach(function(e){opts+='<option value="'+e.name+'">'+e.name+'</option>';});sel.innerHTML=opts;}
async function submitRequest(){var sel=document.getElementById("req-name");var name=sel.value;var start=document.getElementById("req-start").value;var end=document.getElementById("req-end").value;var msg=document.getElementById("req-msg");msg.innerHTML="";if(!name){msg.innerHTML='<span style="color:#c53030">يرجى اختيار اسمك من القائمة</span>';return;}if(!start||!end){msg.innerHTML='<span style="color:#c53030">يرجى اختيار تاريخ البداية وتاريخ النهاية</span>';return;}if(new Date(end)<new Date(start)){msg.innerHTML='<span style="color:#c53030">تاريخ النهاية لا يمكن أن يكون قبل تاريخ البداية</span>';return;}var emp=allEmployees.find(function(e){return e.name===name;});if(!emp){msg.innerHTML='<span style="color:#c53030">يرجى اختيار اسم صحيح من القائمة</span>';return;}var newStart=new Date(start),newEnd=new Date(end);var existing=await api("leaves?select=*,employees(name)&status=in.(pending,approved)");for(var i=0;i<existing.length;i++){var l=existing[i];if(l.employee_id===emp.id)continue;var existingStart=new Date(l.start_date),existingEnd=new Date(l.end_date);var hasOverlap=existingStart<=newEnd&&existingEnd>=newStart;if(hasOverlap){var cname=l.employees?l.employees.name:"";msg.innerHTML='<span style="color:#c53030">لا يمكن إرسال الطلب، يوجد موظف آخر في إجازة خلال هذه الفترة.<br>الفترة تتعارض مع إجازة: '+cname+' من '+fmt(l.start_date)+' إلى '+fmt(l.end_date)+'</span>';return;}}var inserted=await api("leaves","POST",{employee_id:emp.id,start_date:start,end_date:end,status:"pending"});if(inserted&&inserted.length>0){msg.innerHTML='<span style="color:#276749">تم إرسال طلبك بنجاح! سيتم مراجعته من الإدارة.</span>';document.getElementById("req-start").value="";document.getElementById("req-end").value="";await loadAll();}else{msg.innerHTML='<span style="color:#c53030">حدث خطأ، يرجى المحاولة مرة أخرى</span>';}}
loadAll();
</script>
</body>
</html>
