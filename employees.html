<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تتبع الإجازات - الموظفين</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, Tahoma, sans-serif; background: #f0f4f8; color: #2d3748; direction: rtl; }
.navbar { background: #1a202c; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
.navbar-brand { font-size: 16px; font-weight: 700; color: white; text-decoration: none; }
.navbar-links { display: flex; gap: 4px; }
.navbar-links a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500; }
.navbar-links a.active { background: #38a169; color: white; }
.header { background: linear-gradient(135deg, #38a169 0%, #2f855a 100%); color: white; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 26px; font-weight: 700; }
.header p { opacity: 0.85; margin-top: 4px; font-size: 13px; }
.header-badge { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.refresh-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 600; }
.container { max-width: 1100px; margin: 28px auto; padding: 0 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
.stat-card .num { font-size: 36px; font-weight: 700; color: #667eea; }
.stat-card .label { color: #718096; margin-top: 4px; font-size: 14px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
.card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
.today-section { background: linear-gradient(135deg, #e6fffa 0%, #ebf8ff 100%); border: 1px solid #81e6d9; }
table { width: 100%; border-collapse: collapse; }
th { background: #f7fafc; padding: 12px 16px; text-align: right; font-size: 13px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
td { padding: 12px 16px; border-bottom: 1px solid #f0f4f8; font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7fafc; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-active { background: #c6f6d5; color: #276749; }
.badge-upcoming { background: #bee3f8; color: #2c5282; }
.badge-ended { background: #e2e8f0; color: #718096; }
.loading { text-align: center; color: #718096; padding: 24px; }
.empty { text-align: center; color: #a0aec0; padding: 24px; font-size: 14px; }
.request-card { border: 2px solid #c6f6d5; }
.request-card h2 { color: #276749; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
.form-group select, .form-group input, .form-group textarea { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; background: #f7fafc; color: #2d3748; direction: rtl; }
.form-group select:focus, .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #38a169; background: white; }
.form-group textarea { resize: vertical; min-height: 80px; }
.conflict-warning { background: #fff5f5; border: 1.5px solid #fc8181; color: #c53030; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; display: none; }
.conflict-warning.show { display: block; }
.success-msg { background: #f0fff4; border: 1.5px solid #68d391; color: #276749; border-radius: 8px; padding: 14px 16px; font-size: 14px; margin-bottom: 16px; display: none; text-align: center; font-weight: 600; }
.success-msg.show { display: block; }
.submit-btn { background: #38a169; color: white; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; width: 100%; }
.submit-btn:hover:not(:disabled) { background: #2f855a; }
.submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }
.days-preview { font-size: 12px; color: #718096; margin-top: 4px; }
</style>
</head>
<body>
<nav class="navbar">
<a href="index.html" class="navbar-brand">نظام الإجازات</a>
<div class="navbar-links">
<a href="employees.html" class="active">صفحة الموظفين</a>
</div>
</nav>
<div class="header">
<div><h1>نظام تتبع الإجازات</h1><p>عرض الإجازات وتقديم الطلبات</p></div>
<div style="display:flex;gap:10px;align-items:center;">
<span class="header-badge">الموظفين</span>
<button class="refresh-btn" onclick="loadAll()">تحديث</button>
</div>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">إجمالي الإجازات</div></div>
<div class="stat-card"><div class="num" id="stat-active" style="color:#38a169">-</div><div class="label">في إجازة الآن</div></div>
<div class="stat-card"><div class="num" id="stat-upcoming" style="color:#3182ce">-</div><div class="label">إجازات قادمة</div></div>
<div class="stat-card"><div class="num" id="stat-employees" style="color:#805ad5">-</div><div class="label">عدد الموظفين</div></div>
</div>
<div class="card today-section">
<h2>الحالة اليوم</h2>
<div id="today-info" class="loading">جارٍ التحميل...</div>
</div>
<div class="card">
<h2>جميع الإجازات الموافق عليها</h2>
<div id="leaves-table" class="loading">جارٍ التحميل...</div>
</div>
<div class="card request-card">
<h2>تقديم طلب إجازة</h2>
<div class="success-msg" id="success-msg">تم إرسال طلبك بنجاح! سيتم مراجعته من قِبَل الإدارة.</div>
<div class="conflict-warning" id="conflict-warning"></div>
<form id="request-form" onsubmit="submitRequest(event)">
<div class="form-grid">
<div class="form-group"><label>الاسم</label><select id="req-name" required><option value="">-- اختر اسمك --</option></select></div>
<div class="form-group"><label>السبب</label><input type="text" id="req-reason" placeholder="سبب الإجازة" required /></div>
<div class="form-group"><label>تاريخ البداية</label><input type="date" id="req-start" required onchange="onStartChange()" /></div>
<div class="form-group"><label>تاريخ النهاية</label><input type="date" id="req-end" required onchange="onEndChange()" /><span class="days-preview" id="days-preview"></span></div>
<div class="form-group full"><label>ملاحظات إضافية (اختياري)</label><textarea id="req-notes" placeholder="أي تفاصيل إضافية..."></textarea></div>
</div>
<button type="submit" class="submit-btn" id="submit-btn">إرسال الطلب</button>
</form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const SUPABASE_URL="https://wtbypuieilnicomwnwax.supabase.co";
const SUPABASE_KEY="sb_publishable_T88-VXy8YDYL91hk9IgWGg_l0B6Ax4w";
const EMAILJS_SERVICE="service_9vkcpeo";
const EMAILJS_TEMPLATE="template_xykx1lg";
const EMAILJS_PUBLIC_KEY="sltwrjL9WXGInu62s";
const ADMIN_EMAIL="3zzawe1@gmail.com";
const BASE_URL="https://3zzawe1-boop.github.io/leave-tracker";
emailjs.init(EMAILJS_PUBLIC_KEY);
let allApprovedLeaves=[],allEmployees=[];
async function api(path,method="GET",body=null){const opts={method,headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""}};if(body)opts.body=JSON.stringify(body);const res=await fetch(SUPABASE_URL+"/rest/v1/"+path,opts);return res.ok?res.json():[];}
function getStatus(s,e){const t=new Date();t.setHours(0,0,0,0);const sd=new Date(s),ed=new Date(e);if(t>=sd&&t<=ed)return"active";if(t<sd)return"upcoming";return"ended";}
function statusBadge(st){if(st==="active")return'<span class="badge badge-active">في إجازة</span>';if(st==="upcoming")return'<span class="badge badge-upcoming">قادمة</span>';return'<span class="badge badge-ended">انتهت</span>';}
function calcDays(s,e){return Math.round((new Date(e)-new Date(s))/86400000)+1;}
function fmt(d){return new Date(d).toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});}
async function loadAll(){
  const [leaves,emps]=await Promise.all([
    api("leaves?status=eq.approved&select=*"),
    api("employees?select=*&order=name.asc")
  ]);
  allApprovedLeaves=leaves.sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
  allEmployees=emps;
  const sel=document.getElementById("req-name");
  sel.innerHTML='<option value="">-- اختر اسمك --</option>';
  emps.forEach(function(e){sel.innerHTML+='<option value="'+e.name+'">'+e.name+'</option>';});
  const today=new Date();today.setHours(0,0,0,0);
  const active=allApprovedLeaves.filter(function(l){return getStatus(l.start_date,l.end_date)==="active";});
  const upcoming=allApprovedLeaves.filter(function(l){return getStatus(l.start_date,l.end_date)==="upcoming";});
  document.getElementById("stat-total").textContent=allApprovedLeaves.length;
  document.getElementById("stat-active").textContent=active.length;
  document.getElementById("stat-upcoming").textContent=upcoming.length;
  document.getElementById("stat-employees").textContent=emps.length;
  const todayEl=document.getElementById("today-info");
  if(active.length===0){todayEl.innerHTML='<p class="empty">لا يوجد أحد في إجازة اليوم</p>';}
  else{todayEl.innerHTML=active.map(function(l){return '<p style="font-size:15px;padding:8px 0;"><strong>'+l.employee_name+'</strong> — '+l.reason+' ('+fmt(l.start_date)+' إلى '+fmt(l.end_date)+')</p>';}).join('');}
  const tbl=document.getElementById("leaves-table");
  if(allApprovedLeaves.length===0){tbl.innerHTML='<p class="empty">لا توجد إجازات مسجّلة</p>';return;}
  let rows='';
  allApprovedLeaves.forEach(function(l,i){rows+='<tr><td>'+(i+1)+'</td><td>'+l.employee_name+'</td><td>'+fmt(l.start_date)+'</td><td>'+fmt(l.end_date)+'</td><td>'+calcDays(l.start_date,l.end_date)+' يوم</td><td>'+(l.reason||'-')+'</td><td>'+statusBadge(getStatus(l.start_date,l.end_date))+'</td></tr>';});
  tbl.innerHTML='<table><thead><tr><th>#</th><th>الموظف</th><th>تاريخ البداية</th><th>تاريخ النهاية</th><th>عدد الأيام</th><th>السبب</th><th>الحالة</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function onStartChange(){
  var s=document.getElementById("req-start").value;
  var endEl=document.getElementById("req-end");
  if(s){
    var next=new Date(s);next.setDate(next.getDate()+1);
    var minStr=next.toISOString().split("T")[0];
    endEl.min=minStr;
    if(endEl.value&&endEl.value<=s){endEl.value=minStr;}
  }
  updateDaysPreview();
  checkConflict();
}
function onEndChange(){updateDaysPreview();checkConflict();}
function updateDaysPreview(){
  var s=document.getElementById("req-start").value;
  var e=document.getElementById("req-end").value;
  var prev=document.getElementById("days-preview");
  if(s&&e&&e>s){prev.textContent="عدد الأيام: "+calcDays(s,e)+" يوم";}
  else{prev.textContent="";}
}
function checkConflict(){
  var s=document.getElementById("req-start").value;
  var e=document.getElementById("req-end").value;
  var warn=document.getElementById("conflict-warning");
  var btn=document.getElementById("submit-btn");
  if(!s||!e){warn.classList.remove("show");btn.disabled=false;return;}
  var sd=new Date(s),ed=new Date(e);
  var conflict=null;
  for(var i=0;i<allApprovedLeaves.length;i++){
    var l=allApprovedLeaves[i];
    var ls=new Date(l.start_date),le=new Date(l.end_date);
    if(sd<=le&&ed>=ls){conflict=l;break;}
  }
  if(conflict){
    warn.textContent="تعارض! "+conflict.employee_name+" في إجازة من "+fmt(conflict.start_date)+" إلى "+fmt(conflict.end_date)+". لا يمكن تقديم طلب في هذه الفترة.";
    warn.classList.add("show");btn.disabled=true;
  } else {
    warn.classList.remove("show");btn.disabled=false;
  }
}
async function submitRequest(ev){
  ev.preventDefault();
  var name=document.getElementById("req-name").value;
  var reason=document.getElementById("req-reason").value;
  var start=document.getElementById("req-start").value;
  var end=document.getElementById("req-end").value;
  var notes=document.getElementById("req-notes").value;
  var btn=document.getElementById("submit-btn");
  btn.disabled=true;btn.textContent="جارٍ الإرسال...";
  try{
    var res=await api("leaves","POST",{employee_name:name,reason:reason,start_date:start,end_date:end,notes:notes,status:"pending"});
    if(!res||res.length===0)throw new Error("فشل الحفظ");
    var leave=res[0];
    var days=calcDays(start,end);
    await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
      to_email:ADMIN_EMAIL,
      employee_name:name,
      reason:reason,
      start_date:start,
      end_date:end,
      days:days,
      notes:notes||"لا يوجد",
      approve_url:BASE_URL+"/action.html?action=approve&id="+leave.id,
      reject_url:BASE_URL+"/action.html?action=reject&id="+leave.id
    });
    document.getElementById("success-msg").classList.add("show");
    document.getElementById("request-form").reset();
    document.getElementById("days-preview").textContent="";
    document.getElementById("req-end").min="";
    setTimeout(function(){document.getElementById("success-msg").classList.remove("show");},5000);
  }catch(err){
    alert("حدث خطأ أثناء الإرسال. يرجى المحاولة مرة أخرى.");
    console.error(err);
  }
  btn.disabled=false;btn.textContent="إرسال الطلب";
  loadAll();
}
loadAll();
</script>
</body>
</html>
